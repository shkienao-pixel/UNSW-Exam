events {
    worker_connections 1024;
}

http {
    # ── Rate limiting zones ───────────────────────────────────────────────────
    # 普通 API：每个 IP 每分钟 60 次（正常用户够用，刷接口会被限）
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    # AI 生成接口：每个 IP 每分钟 10 次（生成慢且耗钱，严格限制）
    limit_req_zone $binary_remote_addr zone=generate:10m rate=10r/m;
    # 登录/注册：每个 IP 每分钟 5 次（防暴力破解）
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # 限流触发时返回 429 而不是默认的 503
    limit_req_status 429;

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.exammaster.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS API ────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.exammaster.tech;

        ssl_certificate     /etc/letsencrypt/live/api.exammaster.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.exammaster.tech/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # File upload limit (PDFs)
        client_max_body_size 50m;

        # 登录/注册/验证码：严格限制，burst=3 允许短暂突发
        # 包含 resend-otp 和 verify-otp，防止邮件轰炸和暴力枚举
        location ~ ^/auth/(login|register|resend-otp|verify-otp) {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass         http://backend:8002;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # AI 生成接口：每分钟 10 次，burst=5
        location ~ ^/courses/.*/generate {
            limit_req zone=generate burst=5 nodelay;
            proxy_pass         http://backend:8002;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        # 其他所有接口：每分钟 60 次，burst=20
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend:8002;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }
    }
}
