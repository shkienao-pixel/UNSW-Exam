events {
    worker_connections 1024;
}

http {
    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.exammaster.tech;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS API ────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.exammaster.tech;

        ssl_certificate     /etc/letsencrypt/live/api.exammaster.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.exammaster.tech/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # File upload limit (PDFs)
        client_max_body_size 50m;

        location / {
            proxy_pass         http://backend:8002;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts for long AI generation requests
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }
    }
}
